services:

  mongodb:
    image: mongo:5.0
    container_name: centovacast-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: centovacast
    volumes:
      - mongodb_data:/data/db
    networks:
      - clonetova_default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: centovacast-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - media_data:/app/media
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8001:8001"
    depends_on:
      - mongodb
    networks:
      - clonetova_default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: centovacast-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - clonetova_default

  nginx:
    image: nginx:alpine
    container_name: centovacast-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - media_data:/var/www/media:ro
    depends_on:
      - frontend
      - backend
    networks:
      - clonetova_default

  icecast:
    build:
      context: ./icecast
      dockerfile: Dockerfile
    container_name: centovacast-icecast
    restart: unless-stopped
    env_file:
      - ./icecast/.env
    ports:
      - "8000:8000"
    volumes:
      - icecast_logs:/var/log/icecast
    networks:
      - clonetova_default

  liquidsoap-builder:
    build:
      context: ./liquidsoap
      dockerfile: Dockerfile
    image: clonetova-liquidsoap
    container_name: liquidsoap-builder-dummy
    command: ["echo", "Imagen lista"]
    restart: "no"
    networks:
      - clonetova_default

volumes:
  mongodb_data:
  media_data:
  icecast_logs:

networks:
  clonetova_default:
    driver: bridge
    name: clonetova_default
