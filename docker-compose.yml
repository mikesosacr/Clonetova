services:
  mongodb:
    image: mongo:5.0
    container_name: centovacast-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: centovacast-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - mongodb
      - icecast
    environment:
      - MONGO_URL=mongodb://centovacast-mongodb:27017
      - DB_NAME=centovacast
      - SECRET_KEY=clonetova-super-secret-key-2026
      - PUBLIC_IP=141.148.179.210
      - ICECAST_HOST=centovacast-icecast
      - ICECAST_PORT=8000
      - ICECAST_PASSWORD=mikesosa110690047
    volumes:
      - media_data:/app/media

  frontend:
    build:
      context: ./frontend
    container_name: centovacast-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://141.148.179.210:8001

  icecast:
    build: ./icecast
    container_name: centovacast-icecast
    restart: unless-stopped
    ports:
      - "8000:8000"

  liquidsoap:
    build: ./liquidsoap
    container_name: centovacast-liquidsoap
    restart: unless-stopped
    depends_on:
      - backend
      - icecast
    environment:
      - BACKEND_URL=http://centovacast-backend:8001
      - ICECAST_HOST=centovacast-icecast
      - ICECAST_PORT=8000
      - ICECAST_PASSWORD=fuente123
      - MOUNT_POINT=/osaradio
      - STREAM_ID=6ffc2648-12dc-4b4b-891c-351fcefe4659
      - API_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbkBjbG9uZXRvdmEubG9jYWwiLCJleHAiOjE4OTM0NTYwMDB9.4PCEwybKjWzjJvZqEPjk3aT9N6RgaZDrh9jNi6BCG9k
    volumes:
      - media_data:/app/media

  nginx:
    image: nginx:alpine
    container_name: centovacast-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  mongodb_data:
  media_data:
