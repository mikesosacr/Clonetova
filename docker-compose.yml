services:
  mongodb:
    image: mongo:5.0
    container_name: centovacast-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: centovacast-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - mongodb
      - icecast
    environment:
      - MONGO_URL=mongodb://centovacast-mongodb:27017
      - DB_NAME=centovacast
      - SECRET_KEY=clonetova-super-secret-key-2026
      - PUBLIC_IP=141.148.179.210

  frontend:
    build:
      context: ./frontend
    container_name: centovacast-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://141.148.179.210:8001

  icecast:
    build: ./icecast
    container_name: centovacast-icecast
    restart: unless-stopped
    ports:
      - "8000:8000"

volumes:
  mongodb_data:
